<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nishma's CodSoft Submission</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .main-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }

        h1 {
            color: #1a73e8;
            margin-bottom: 20px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .task-btn {
            text-decoration: none;
            background-color: #1a73e8;
            color: white;
            padding: 14px;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
            display: block;
        }

        .task-btn:hover {
            background-color: #1557b0;
            transform: translateY(-2px);
        }

        .footer-text {
            margin-top: 30px;
            font-size: 12px;
            color: #9aa0a6;
        }
    </style>
</head>

<body>
    <div class="main-card">
        <h1>CodSoft Submission</h1>
        <p>Level 1: Web Development</p>

        <div class="links-container">
            <a href="task1/index.html" class="task-btn">Task 1: Portfolio</a>
            <a href="task2/index.html" class="task-btn">Task 2: Landing Page</a>
            <a href="task3/index.html" class="task-btn">Task 3: Calculator</a>
        </div>

        <div class="footer-text">Submitted by: Nishma</div>
    </div>
</body>
</html>
